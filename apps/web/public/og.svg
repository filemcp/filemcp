<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="cyan-glow" cx="20%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet-glow" cx="85%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" patternUnits="userSpaceOnUse" width="28" height="28">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.05)"/>
    </pattern>
    <radialGradient id="grid-mask" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="80%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="grid-fade">
      <rect width="1200" height="630" fill="url(#grid-mask)"/>
    </mask>
  </defs>

  <!-- Dark bg -->
  <rect width="1200" height="630" fill="#09090b"/>

  <!-- Dotted grid (faded toward edges) -->
  <rect width="1200" height="630" fill="url(#grid)" mask="url(#grid-fade)"/>

  <!-- Ambient glows -->
  <rect width="1200" height="630" fill="url(#cyan-glow)"/>
  <rect width="1200" height="630" fill="url(#violet-glow)"/>

  <!-- Eyebrow tagline -->
  <text x="600" y="152" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="16" font-weight="500"
        letter-spacing="3"
        fill="#67e8f9">
    THE PUBLISHING LAYER FOR AI-GENERATED WORK
  </text>

  <!-- Headline -->
  <text x="600" y="263" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="78" font-weight="600" letter-spacing="-1.6"
        fill="white">
    Turn AI-generated work
  </text>
  <text x="600" y="355" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="78" font-weight="600" letter-spacing="-1.6"
        fill="white">
    into shareable links.
  </text>

  <!-- Brand logo at bottom -->
  <image href="/logo.png" x="420" y="428" width="360" height="57" preserveAspectRatio="xMidYMid meet"/>
</svg>
