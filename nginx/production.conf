server {
    listen 80;
    server_name filemcp.ai www.filemcp.ai api.filemcp.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.filemcp.ai;

    ssl_certificate /etc/letsencrypt/live/filemcp.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/filemcp.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://filemcp.ai$request_uri;
}

server {
    listen 443 ssl;
    server_name filemcp.ai;

    ssl_certificate /etc/letsencrypt/live/filemcp.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/filemcp.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name api.filemcp.ai;

    ssl_certificate /etc/letsencrypt/live/filemcp.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/filemcp.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
