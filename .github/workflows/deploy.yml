name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      branch:
        description: Branch to deploy
        required: true
        default: main
        type: string
      service:
        description: Service to deploy (leave empty to deploy all)
        required: false
        default: ''
        type: string

jobs:
  deploy:
    name: ${{ github.event.inputs.environment }} — ${{ github.event.inputs.branch }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Generate .env file
        run: |
          cat > /tmp/deploy.env <<EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          S3_BUCKET=${{ vars.S3_BUCKET }}
          S3_REGION=${{ vars.AWS_REGION || 'eu-central-1' }}
          S3_PUBLIC_URL=${{ vars.S3_PUBLIC_URL }}
          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          SES_REGION=${{ vars.SES_REGION || 'eu-central-1' }}
          SES_ACCESS_KEY_ID=${{ secrets.SES_ACCESS_KEY_ID }}
          SES_SECRET_ACCESS_KEY=${{ secrets.SES_SECRET_ACCESS_KEY }}
          EOF
          # strip leading whitespace introduced by heredoc indentation
          sed -i 's/^ *//' /tmp/deploy.env

      - name: Build & push Docker images
        run: |
          SERVICE_FLAG=""
          [ -n "${{ github.event.inputs.service }}" ] && SERVICE_FLAG="--service=${{ github.event.inputs.service }}"
          chmod +x build.sh
          ./build.sh \
            --env=${{ github.event.inputs.environment }} \
            --account=${{ vars.AWS_ACCOUNT_ID }} \
            --region=${{ vars.AWS_REGION || 'eu-central-1' }} \
            $SERVICE_FLAG

      - name: Release to ${{ github.event.inputs.environment }}
        run: |
          SERVICE_FLAG=""
          [ -n "${{ github.event.inputs.service }}" ] && SERVICE_FLAG="--service=${{ github.event.inputs.service }}"
          chmod +x release.sh
          ./release.sh \
            --env=${{ github.event.inputs.environment }} \
            --account=${{ vars.AWS_ACCOUNT_ID }} \
            --region=${{ vars.AWS_REGION || 'eu-central-1' }} \
            --ssh-key=$HOME/.ssh/deploy_key \
            --username=${{ secrets.SSH_USERNAME }} \
            --aws-access-key=${{ secrets.AWS_ACCESS_KEY_ID }} \
            --aws-secret-key=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            --env-file=/tmp/deploy.env \
            $SERVICE_FLAG
