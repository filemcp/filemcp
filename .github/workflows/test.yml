name: Test

on:
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend (Jest)
    runs-on: ubuntu-latest
    container: node:22

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: filemcp
          POSTGRES_PASSWORD: filemcp
          POSTGRES_DB: filemcp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm exec prisma generate

      - name: Run tests
        working-directory: apps/api
        env:
          DB_HOST: postgres
        run: pnpm test --forceExit --ci

  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    container: node:22

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: apps/web
        run: pnpm test
