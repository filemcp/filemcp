name: Feature request
description: Suggest an idea or improvement.
title: "[feat]: "
labels: ["type:feature", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. We're more likely to ship things that solve a real, concrete problem — please describe the problem first, then the proposed solution.

        For broader product directions or RFC-style discussions, consider opening a [Discussion](https://github.com/filemcp/filemcp/discussions) instead.

  - type: textarea
    id: problem
    attributes:
      label: What's the problem?
      description: What are you trying to do? Why is the current state insufficient?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? UI mockups, API shapes, or pseudo-code all welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why this one is better.

  - type: dropdown
    id: surface
    attributes:
      label: Where would this live?
      multiple: true
      options:
        - Web app (dashboard)
        - Web app (asset viewer)
        - Web app (marketing/auth pages)
        - REST API
        - MCP server
        - CLI / curl
        - Email
        - Worker (thumbnails)
        - Docs / repo

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Related issues, prior art in other tools, links to discussions.
