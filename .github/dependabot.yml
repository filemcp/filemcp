version: 2
updates:
  # JavaScript / TypeScript dependencies (pnpm workspace)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "type:chore"
      - "area:deps"
    commit-message:
      prefix: "deps"
      include: "scope"
    ignore:
      # Major bumps for migration-heavy packages are suppressed — Dependabot
      # opens PRs for them too easily and most require real surgery (config
      # shape changes, breaking API rewrites, lockstep ecosystem upgrades).
      # We bump these manually on our own schedule. Minor + patch keep flowing.
      # To take on a major, remove the relevant entry and Dependabot will
      # re-open the PR on its next run.
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "nuxt"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@nuxt/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@nuxtjs/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vue"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vue/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pinia"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@pinia/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/jest"
        update-types: ["version-update:semver-major"]
    groups:
      # Bundle minor + patch updates by ecosystem to keep PR noise down
      nestjs:
        patterns:
          - "@nestjs/*"
        update-types: ["minor", "patch"]
      nuxt-vue:
        patterns:
          - "nuxt"
          - "@nuxt/*"
          - "@nuxtjs/*"
          - "vue"
          - "@vue/*"
          - "@pinia/*"
          - "pinia"
        update-types: ["minor", "patch"]
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
        update-types: ["minor", "patch"]
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
        update-types: ["minor", "patch"]
      dev-tooling:
        patterns:
          - "typescript"
          - "vitest"
          - "jest"
          - "@types/*"
          - "tsx"
          - "@vitejs/*"
        update-types: ["minor", "patch"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "type:chore"
      - "area:ci"
    commit-message:
      prefix: "ci"

  # Docker base images in Dockerfiles
  - package-ecosystem: "docker"
    directory: "/apps/worker"
    schedule:
      interval: "monthly"
    labels:
      - "type:chore"
      - "area:infra"
