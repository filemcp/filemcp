services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cdnmcp
      POSTGRES_PASSWORD: cdnmcp
      POSTGRES_DB: cdnmcp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cdnmcp
      MINIO_ROOT_PASSWORD: cdnmcp_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 3;
        mc alias set local http://minio:9000 cdnmcp cdnmcp_secret;
        mc mb local/cdnmcp-assets --ignore-existing;
        mc anonymous set download local/cdnmcp-assets;
        exit 0;
      "

  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && cd apps/api && pnpm exec prisma generate && pnpm exec prisma migrate deploy && pnpm run dev"
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - pnpm_store:/root/.local/share/pnpm/store
    environment:
      DATABASE_URL: postgresql://cdnmcp:cdnmcp@postgres:5432/cdnmcp
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-prod
      JWT_ACCESS_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 7d
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: cdnmcp-assets
      S3_ACCESS_KEY: cdnmcp
      S3_SECRET_KEY: cdnmcp_secret
      S3_PUBLIC_URL: http://localhost:9000/cdnmcp-assets
      APP_URL: http://localhost:3000
      API_URL: http://localhost:4000
      PORT: 4000
    depends_on:
      - postgres
      - redis
      - minio-init

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && cd apps/web && npx nuxt dev --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - pnpm_store:/root/.local/share/pnpm/store
    environment:
      NUXT_API_URL: http://api:4000/api
      NUXT_PUBLIC_API_URL: http://localhost:4000/api
    depends_on:
      - api

  playwright-worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    working_dir: /app
    command: >
      sh -c "pnpm install &&
             cd apps/worker &&
             pnpm exec prisma generate --schema=../api/prisma/schema.prisma &&
             pnpm run dev"
    volumes:
      - .:/app
      - pnpm_store:/root/.local/share/pnpm/store
    environment:
      DATABASE_URL: postgresql://cdnmcp:cdnmcp@postgres:5432/cdnmcp
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: cdnmcp-assets
      S3_ACCESS_KEY: cdnmcp
      S3_SECRET_KEY: cdnmcp_secret
    depends_on:
      - redis
      - postgres
      - minio-init
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
  pnpm_store:
