services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: filemcp
      POSTGRES_PASSWORD: filemcp
      POSTGRES_DB: filemcp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file: .env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    env_file: .env
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 3;
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        mc mb local/$$S3_BUCKET --ignore-existing;
        mc anonymous set download local/$$S3_BUCKET;
        exit 0;
      "

  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && cd apps/api && pnpm exec prisma generate && pnpm exec prisma migrate deploy && pnpm run dev"
    volumes:
      - .:/app
      - pnpm_store:/root/.local/share/pnpm/store
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      - postgres
      - redis
      - minio-init

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && cd apps/web && npx nuxt dev --port 3000"
    volumes:
      - .:/app
      - pnpm_store:/root/.local/share/pnpm/store
    env_file: .env
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

  playwright-worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    working_dir: /app
    command: >
      sh -c "pnpm install &&
             cd apps/worker &&
             pnpm exec prisma generate --schema=../api/prisma/schema.prisma &&
             pnpm run dev"
    volumes:
      - .:/app
      - pnpm_store:/root/.local/share/pnpm/store
    env_file: .env
    depends_on:
      - redis
      - postgres
      - minio-init
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
  pnpm_store:
