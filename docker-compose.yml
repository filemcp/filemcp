services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: filemcp
      POSTGRES_PASSWORD: filemcp
      POSTGRES_DB: filemcp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 3;
        mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY};
        mc mb local/${S3_BUCKET} --ignore-existing;
        mc anonymous set download local/${S3_BUCKET};
        exit 0;
      "

  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && cd apps/api && pnpm exec prisma generate && pnpm exec prisma migrate deploy && pnpm run dev"
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    volumes:
      - .:/app
      - pnpm_store:/root/.local/share/pnpm/store
    env_file: .env
    environment:
      # Override .env — these hostnames only resolve inside the Docker network
      DATABASE_URL: postgresql://filemcp:filemcp@postgres:5432/filemcp
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    depends_on:
      - postgres
      - redis
      - minio-init

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && cd apps/web && npx nuxt dev --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - pnpm_store:/root/.local/share/pnpm/store
    environment:
      NUXT_API_URL: http://api:${PORT:-4000}/api
      NUXT_PUBLIC_API_URL: ${API_URL}
    depends_on:
      - api

  playwright-worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    working_dir: /app
    command: >
      sh -c "pnpm install &&
             cd apps/worker &&
             pnpm exec prisma generate --schema=../api/prisma/schema.prisma &&
             pnpm run dev"
    volumes:
      - .:/app
      - pnpm_store:/root/.local/share/pnpm/store
    env_file: .env
    environment:
      # Override .env — these hostnames only resolve inside the Docker network
      DATABASE_URL: postgresql://filemcp:filemcp@postgres:5432/filemcp
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    depends_on:
      - redis
      - postgres
      - minio-init
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
  pnpm_store:
